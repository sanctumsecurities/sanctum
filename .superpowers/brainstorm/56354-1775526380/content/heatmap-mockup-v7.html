<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace; min-height: 100vh; padding: 40px; }
  .dashboard { max-width: 1400px; margin: 0 auto; }

  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid #1a1a1a;
    margin-bottom: 40px; font-size: 11px; color: #555;
  }
  .nav .status { display: flex; align-items: center; gap: 8px; }
  .nav .status .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }
  .nav .tabs { display: flex; gap: 24px; }
  .nav .tabs span.active { color: #fff; text-decoration: underline; text-underline-offset: 8px; }

  .hero { display: flex; align-items: flex-start; justify-content: space-between; }
  .hero-left { flex-shrink: 0; }
  .hero-left h1 { font-size: 64px; font-weight: 700; letter-spacing: 0.08em; line-height: 1; color: #fff; }
  .search-bar { margin-top: 40px; padding: 12px 0; display: flex; align-items: center; gap: 10px; }
  .search-bar .prompt { color: #444; font-size: 12px; }
  .search-bar .placeholder { color: #444; font-size: 12px; letter-spacing: 0.05em; }
  .search-line { height: 1px; background: #333; width: 420px; }

  .heatmap-wrap { flex-shrink: 0; width: 580px; align-self: flex-start; margin-top: 4px; }
  .period-selector { display: flex; justify-content: flex-end; gap: 2px; margin-bottom: 8px; }
  .period-selector span {
    font-size: 9px; padding: 3px 7px; border-radius: 3px;
    cursor: pointer; color: #555; transition: all 0.15s;
  }
  .period-selector span:hover { color: #999; }
  .period-selector span.active { color: #fff; background: rgba(255,255,255,0.08); }

  .heatmap-rect {
    width: 100%; height: 150px; border-radius: 4px; overflow: hidden;
    position: relative;
  }

  .sector {
    position: absolute;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: default; transition: filter 0.15s;
    border: 0.5px solid rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .sector:hover { filter: brightness(1.3); }
  .sector .name { font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.5); white-space: nowrap; }
  .sector .pct { color: rgba(255,255,255,0.75); margin-top: 1px; white-space: nowrap; }

  .sector .tip {
    display: none; position: absolute; bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%); background: #1a1f2e;
    border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
    padding: 8px 12px; white-space: nowrap; z-index: 50;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); pointer-events: none;
  }
  .sector:hover .tip { display: block; }
  .tip .tip-name { font-size: 11px; color: #e8ecf1; font-weight: 600; }
  .tip .tip-etf { font-size: 9px; color: #5a6475; margin-top: 2px; }
  .tip .tip-pct { font-size: 11px; font-weight: 700; margin-top: 4px; }

  .recent-label {
    margin-top: 56px; font-size: 12px; color: #555;
    letter-spacing: 0.1em; padding-bottom: 14px; border-bottom: 1px solid #1a1a1a;
  }
  .report-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 24px; }
  .report-card {
    background: rgba(255,255,255,0.02); border: 1px solid #1a1a1a;
    border-radius: 8px; padding: 20px; height: 180px;
  }
  .report-card .ticker { font-size: 16px; font-weight: 700; }
  .report-card .sub { font-size: 10px; color: #555; margin-top: 4px; }
  .report-card .price { font-size: 20px; font-weight: 700; margin-top: 16px; }
  .report-card .chart-placeholder { height: 50px; margin-top: 16px; background: rgba(255,255,255,0.02); border-radius: 4px; }
</style>
</head>
<body>
<div class="dashboard">
  <div class="nav">
    <div class="status">
      <div class="dot"></div>
      <span style="color:#22c55e">TERMINAL ACTIVE</span>
      <span style="margin-left:8px">|</span>
      <span style="margin-left:8px">MARKET CLOSED</span>
      <span style="margin-left:8px">|</span>
      <span style="margin-left:8px;color:#f87171">23 EXTREME FEAR</span>
    </div>
    <div class="tabs">
      <span class="active">Dashboard</span>
      <span>Matrix</span>
      <span>Watchlist</span>
    </div>
    <span>Mon, Apr 6, 2026, 06:41 PM</span>
  </div>

  <div class="hero">
    <div class="hero-left">
      <h1>SANCTUM</h1>
      <div class="search-bar">
        <span class="prompt">&gt;</span>
        <span class="placeholder">ENTER TICKER TO GENERATE REPORT</span>
      </div>
      <div class="search-line"></div>
    </div>

    <div class="heatmap-wrap">
      <div class="period-selector">
        <span class="active">1D</span>
        <span>5D</span>
        <span>3M</span>
        <span>6M</span>
        <span>YTD</span>
        <span>1Y</span>
      </div>
      <div class="heatmap-rect" id="treemap"></div>
    </div>
  </div>

  <div class="recent-label">RECENT REPORTS</div>
  <div class="report-cards">
    <div class="report-card">
      <div style="display:flex;justify-content:space-between">
        <span class="ticker">TSLA</span>
        <span style="color:#eab308;font-size:10px;font-weight:600">HOLD</span>
      </div>
      <div class="sub">Tesla, Inc.</div>
      <div class="price">$352.82 <span style="color:#f87171;font-size:12px">-2.96%</span></div>
      <div class="chart-placeholder"></div>
    </div>
    <div class="report-card">
      <div style="display:flex;justify-content:space-between">
        <span class="ticker">GOOG</span>
        <span style="color:#4ade80;font-size:10px;font-weight:600">BUY</span>
      </div>
      <div class="sub">Alphabet Inc.</div>
      <div class="price">$297.66 <span style="color:#4ade80;font-size:12px">+1.00%</span></div>
      <div class="chart-placeholder"></div>
    </div>
    <div class="report-card" style="opacity:0.3;border-color:#111"></div>
    <div class="report-card" style="opacity:0.3;border-color:#111"></div>
  </div>
</div>

<script>
// Squarified treemap algorithm
const sectors = [
  { name: 'Tech',    full: 'Technology',              etf: 'XLK',  weight: 30, change: 2.14 },
  { name: 'Health',  full: 'Healthcare',              etf: 'XLV',  weight: 13, change: 1.42 },
  { name: 'Fin',     full: 'Financials',              etf: 'XLF',  weight: 13, change: 0.81 },
  { name: 'Disc',    full: 'Consumer Discretionary',  etf: 'XLY',  weight: 10, change: -2.31 },
  { name: 'Comm',    full: 'Communication Services',  etf: 'XLC',  weight: 9,  change: 1.12 },
  { name: 'Ind',     full: 'Industrials',             etf: 'XLI',  weight: 8,  change: -0.94 },
  { name: 'Stpl',    full: 'Consumer Staples',        etf: 'XLP',  weight: 6,  change: -0.38 },
  { name: 'Energy',  full: 'Energy',                  etf: 'XLE',  weight: 4,  change: -1.87 },
  { name: 'Util',    full: 'Utilities',               etf: 'XLU',  weight: 3,  change: 0.22 },
  { name: 'RE',      full: 'Real Estate',             etf: 'XLRE', weight: 2,  change: 0.04 },
  { name: 'Mat',     full: 'Materials',               etf: 'XLB',  weight: 2,  change: 0.31 },
];

function getColor(change) {
  const abs = Math.abs(change);
  if (abs < 0.15) return '#1a1a1a';
  if (change > 0) {
    if (abs >= 2.0) return '#16a34a';
    if (abs >= 1.0) return '#15803d';
    if (abs >= 0.5) return '#166534';
    return '#14532d';
  } else {
    if (abs >= 2.0) return '#dc2626';
    if (abs >= 1.0) return '#b91c1c';
    if (abs >= 0.5) return '#991b1b';
    return '#7f1d1d';
  }
}

function getPctColor(change) {
  if (Math.abs(change) < 0.15) return '#5a6475';
  return change >= 0 ? '#4ade80' : '#f87171';
}

// Squarified treemap layout
function squarify(items, x, y, w, h) {
  const rects = [];
  const total = items.reduce((s, d) => s + d.weight, 0);
  let remaining = [...items];
  let cx = x, cy = y, cw = w, ch = h;

  while (remaining.length > 0) {
    const areaLeft = remaining.reduce((s, d) => s + d.weight, 0);
    const isWide = cw >= ch;
    const side = isWide ? ch : cw;

    // Find best row
    let row = [remaining[0]];
    let rowSum = remaining[0].weight;
    let bestWorst = Infinity;

    for (let i = 1; i < remaining.length; i++) {
      const testRow = [...row, remaining[i]];
      const testSum = rowSum + remaining[i].weight;
      const rowFraction = testSum / areaLeft;
      const rowSide = isWide ? cw * rowFraction : ch * rowFraction;

      let worst = 0;
      for (const item of testRow) {
        const itemFraction = item.weight / testSum;
        const itemLen = side * itemFraction;
        const aspect = Math.max(rowSide / itemLen, itemLen / rowSide);
        worst = Math.max(worst, aspect);
      }

      // Check current row's worst
      const curFraction = rowSum / areaLeft;
      const curSide = isWide ? cw * curFraction : ch * curFraction;
      let curWorst = 0;
      for (const item of row) {
        const itemFraction = item.weight / rowSum;
        const itemLen = side * itemFraction;
        const aspect = Math.max(curSide / itemLen, itemLen / curSide);
        curWorst = Math.max(curWorst, aspect);
      }

      if (worst <= curWorst) {
        row = testRow;
        rowSum = testSum;
      } else {
        break;
      }
    }

    // Layout this row
    const rowFraction = rowSum / areaLeft;
    if (isWide) {
      const rowW = cw * rowFraction;
      let ry = cy;
      for (const item of row) {
        const itemH = ch * (item.weight / rowSum);
        rects.push({ ...item, x: cx, y: ry, w: rowW, h: itemH });
        ry += itemH;
      }
      cx += rowW;
      cw -= rowW;
    } else {
      const rowH = ch * rowFraction;
      let rx = cx;
      for (const item of row) {
        const itemW = cw * (item.weight / rowSum);
        rects.push({ ...item, x: rx, y: cy, w: itemW, h: rowH });
        rx += itemW;
      }
      cy += rowH;
      ch -= rowH;
    }

    remaining = remaining.slice(row.length);
  }

  return rects;
}

// Render
const container = document.getElementById('treemap');
const W = 580, H = 150;
const rects = squarify(sectors, 0, 0, W, H);

rects.forEach(r => {
  const div = document.createElement('div');
  div.className = 'sector';
  div.style.left = r.x + 'px';
  div.style.top = r.y + 'px';
  div.style.width = r.w + 'px';
  div.style.height = r.h + 'px';
  div.style.background = getColor(r.change);

  const area = r.w * r.h;
  const nameSize = area > 8000 ? 12 : area > 4000 ? 10 : area > 2000 ? 9 : 8;
  const pctSize = area > 8000 ? 9 : area > 4000 ? 8 : 7;
  const sign = r.change >= 0 ? '+' : '';

  div.innerHTML = `
    <div class="tip">
      <div class="tip-name">${r.full}</div>
      <div class="tip-etf">${r.etf}</div>
      <div class="tip-pct" style="color:${getPctColor(r.change)}">${sign}${r.change.toFixed(2)}%</div>
    </div>
    <span class="name" style="font-size:${nameSize}px">${r.name}</span>
    ${area > 1500 ? `<span class="pct" style="font-size:${pctSize}px">${sign}${r.change.toFixed(2)}%</span>` : ''}
  `;

  container.appendChild(div);
});
</script>
</body>
</html>
